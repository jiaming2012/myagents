# =============================================================
# Transfer Rules
# =============================================================
transfer_rules:
  # All income -> Mercury Personal -> distribute to other accounts
  personal_hub: mercury-personal-6343
  # Business income -> Mercury Business Income -> outgoing ACH for business expenses
  business_hub: mercury-biz-income-4613
  business_outgoing: mercury-biz-outgoing-5396
  # When business needs funding: personal hub -> business hub
  business_funding_source: mercury-personal-6343
  minimum_coverage_days: 7
  preferred_coverage_days: 14
