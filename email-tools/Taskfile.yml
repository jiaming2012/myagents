version: "3"

tasks:
  build:
    desc: Build all commands
    cmds:
      - go build ./cmd/...

  cleanup:
    desc: Review and delete old/promo emails
    cmds:
      - go run ./cmd/cleanup {{.CLI_ARGS}}

  cleanup:dry:
    desc: Preview what would be deleted (no prompts)
    cmds:
      - go run ./cmd/cleanup --dry-run

  cleanup:old:
    desc: Clean emails older than N days (default 30)
    cmds:
      - go run ./cmd/cleanup --older-than 30 {{.CLI_ARGS}}

  important:download:
    desc: Download emails from all accounts
    cmds:
      - go run ./cmd/important download {{.CLI_ARGS}}

  important:analyze:
    desc: Analyze downloaded emails with Claude Code
    cmds:
      - claude "Read email-tools/.cache/important/emails.json and classify each email. For each email, determine topic (Finance/Security/Work/Social/Shopping/Travel/Health/Newsletter/Other), urgency (urgent/action_needed/fyi), a 1-2 sentence summary, and why_important. Be aggressive about marking promotional, marketing, newsletter, and sales emails as fyi. Only use urgent for things requiring immediate action to prevent harm. Only use action_needed for genuine deadlines or failed transactions. Write results to email-tools/.cache/important/insights.json using the InsightsManifest format from email-tools/internal/pipeline/types.go."

  important:view:
    desc: View analyzed emails in TUI
    cmds:
      - go run ./cmd/important view {{.CLI_ARGS}}

  important:status:
    desc: Show download/analysis progress
    cmds:
      - go run ./cmd/important status

  important:
    desc: Full pipeline - download, analyze, view
    cmds:
      - task: important:download
      - task: important:analyze
      - task: important:view

  auth:
    desc: Run OAuth2 setup for an account
    cmds:
      - go run ./cmd/auth {{.CLI_ARGS}}

  auth:gmail:
    desc: "OAuth2 flow for a Gmail account (usage: task auth:gmail EMAIL=user@gmail.com)"
    vars:
      EMAIL: '{{.EMAIL}}'
    cmds:
      - go run ./cmd/auth --provider gmail --email {{.EMAIL}}

  auth:zoho:
    desc: OAuth2 flow for Zoho account
    cmds:
      - go run ./cmd/auth --provider zoho

  test:
    desc: Run tests
    cmds:
      - go test ./...
