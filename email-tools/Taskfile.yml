version: "3"

tasks:
  build:
    desc: Build all commands
    cmds:
      - go build ./cmd/...

  cleanup:
    desc: Review and delete old/promo emails
    cmds:
      - go run ./cmd/cleanup {{.CLI_ARGS}}

  cleanup:dry:
    desc: Preview what would be deleted (no prompts)
    cmds:
      - go run ./cmd/cleanup --dry-run

  cleanup:recent:
    desc: Clean emails from the last 7 days
    cmds:
      - go run ./cmd/cleanup --newer-than 7 {{.CLI_ARGS}}

  cleanup:old:
    desc: Clean emails older than N days (default 30)
    cmds:
      - go run ./cmd/cleanup --older-than 30 {{.CLI_ARGS}}

  inbox:download:
    desc: Download emails from all accounts
    cmds:
      - go run ./cmd/inbox download {{.CLI_ARGS}}

  inbox:analyze:
    desc: Analyze downloaded emails with Claude Code
    cmds:
      - claude "Read email-tools/.cache/inbox/emails.json and classify each email. Use the email body for deeper understanding. For each email, determine topic (Finance/Security/Work/Social/Shopping/Travel/Health/Newsletter/Other), urgency (urgent/action_needed/fyi), a 1-2 sentence summary, why_important, and action_items (specific actionable steps like 'Pay $450 to Progressive by May 30' — empty array if none). Be aggressive about marking promotional, marketing, newsletter, and sales emails as fyi. Only use urgent for things requiring immediate action to prevent harm. Only use action_needed for genuine deadlines or failed transactions. Write results to email-tools/.cache/inbox/insights.json using the InsightsManifest format from email-tools/internal/pipeline/types.go."

  inbox:view:
    desc: View analyzed emails in TUI
    cmds:
      - go run ./cmd/inbox view {{.CLI_ARGS}}

  inbox:status:
    desc: Show download/analysis progress
    cmds:
      - go run ./cmd/inbox status

  inbox:
    desc: Full pipeline - download, analyze, view
    cmds:
      - task: inbox:download
      - task: inbox:analyze
      - task: inbox:view

  auth:
    desc: Run OAuth2 setup for an account
    cmds:
      - go run ./cmd/auth {{.CLI_ARGS}}

  auth:gmail:
    desc: "OAuth2 flow for a Gmail account (usage: task auth:gmail EMAIL=user@gmail.com)"
    vars:
      EMAIL: '{{.EMAIL}}'
    cmds:
      - go run ./cmd/auth --provider gmail --email {{.EMAIL}}

  auth:zoho:
    desc: OAuth2 flow for Zoho account
    cmds:
      - go run ./cmd/auth --provider zoho

  test:
    desc: Run tests
    cmds:
      - go test ./...
